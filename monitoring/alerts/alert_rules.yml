groups:
  - name: agencia_alerts
    rules:
      - alert: HighErrorRate
        expr: rate(agencia_errors_total[5m]) > 0.1
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "High error rate detected"
          description: "Error rate is {{ $value }} errors/sec over the last 5 minutes."

      - alert: ServiceDown
        expr: up == 0
        for: 1m
        labels:
          severity: critical
        annotations:
          summary: "Service {{ $labels.job }} is down"
          description: "{{ $labels.instance }} has been unreachable for more than 1 minute."

      - alert: HighMemoryUsage
        expr: agencia_memory_usage_bytes{type="rss"} > 1073741824
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage"
          description: "Memory usage is {{ $value | humanize1024 }}B."

      - alert: HighQueueDepth
        expr: agencia_queue_depth > 1000
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High queue depth"
          description: "Queue {{ $labels.queue_name }} has {{ $value }} pending tasks."

      - alert: LLMProviderDown
        expr: rate(agencia_llm_provider_requests_total[5m]) == 0
        for: 10m
        labels:
          severity: critical
        annotations:
          summary: "No LLM provider requests"
          description: "No LLM requests recorded in the last 10 minutes."
