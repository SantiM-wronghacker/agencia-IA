upstream api_agencia {
    server api_agencia:8000;
}

upstream dashboard_web {
    server dashboard_web:8080;
}

upstream app_dashboard {
    server app_dashboard:5000;
}

upstream app_streamlit {
    server app_streamlit:8501;
}

server {
    listen 80;
    server_name localhost;

    # ─── API Gateway ──────────────────────────────────────────
    location /api/ {
        proxy_pass http://api_agencia/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_read_timeout 300s;
        proxy_connect_timeout 75s;
    }

    # ─── Dashboard Web ────────────────────────────────────────
    location /dashboard/ {
        proxy_pass http://dashboard_web/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── App Dashboard (Flask) ────────────────────────────────
    location /app/ {
        proxy_pass http://app_dashboard/;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
    }

    # ─── Streamlit ────────────────────────────────────────────
    location /streamlit/ {
        proxy_pass http://app_streamlit/;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_read_timeout 86400;
    }

    # ─── Health Check ─────────────────────────────────────────
    location /health {
        proxy_pass http://api_agencia/health;
    }

    # ─── Rate Limiting ────────────────────────────────────────
    location / {
        return 404;
    }
}
